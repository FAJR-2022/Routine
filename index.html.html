<!doctype html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول الروتين اليومي</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
html, body {min-height:100%;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;direction:rtl;}
body {
  background: linear-gradient(135deg, #fddde6 0%, #ffebf0 100%);
  padding: 20px;
}
.container {
  max-width:900px;
  margin:0 auto;
  background:white;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  overflow:hidden;
}
.header {
  background: linear-gradient(135deg, #f8a5c2, #ffb6c1);
  color:white;
  padding:40px 20px;
  text-align:center;
}
.header h1 {font-size:32px;margin-bottom:10px;}
.header p {font-size:14px;opacity:0.9;}
.content {padding:30px;}
.section {margin-bottom:30px;}
.section h2 {
  color:#ff6f91;
  font-size:22px;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:10px;
}
.task-list {display:grid;gap:12px;}
.task-item {
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px;
  background:#f8f9ff;
  border-radius:12px;
  border:2px solid #ffe0f0;
  transition:all 0.3s ease;
  cursor:pointer;
}
.task-item:hover {background:#fce6f0;border-color:#ffb6c1;}
.task-item.completed {background:#ffd6e8;border-color:#ff6f91;}
.task-checkbox {
  width:28px;height:28px;min-width:28px;
  border:2px solid #ddd;
  border-radius:8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:white;
  transition:all 0.3s ease;
}
.task-item.completed .task-checkbox {
  background:#ffb6c1;
  border-color:#ff6f91;
  color:white;
  font-size:18px;
}
.task-name {
  flex:1;font-size:16px;color:#333;font-weight:500;display:flex;align-items:center;gap:10px;
}
.task-item.completed .task-name {color:#ff6f91;text-decoration:line-through;}
.progress-section {background:#ffe6f0;padding:20px;border-radius:12px;margin-top:20px;}
.progress-title {color:#ff6f91;font-size:18px;margin-bottom:15px;text-align:center;}
.progress-bar {width:100%;height:30px;background:#ffd6e8;border-radius:15px;overflow:hidden;margin-bottom:10px;}
.progress-fill {height:100%;background:linear-gradient(90deg,#ffb6c1,#ff6f91);transition:width 0.4s ease;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:12px;}
.stars-container {text-align:center;margin-top:15px;}
.stars {font-size:24px;letter-spacing:5px;margin:10px 0;}
.stats {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:15px;}
.stat-box {background:white;padding:15px;border-radius:10px;border:2px solid #ffe0f0;text-align:center;}
.stat-number {font-size:24px;font-weight:bold;color:#ff6f91;}
.stat-label {font-size:12px;color:#999;margin-top:5px;}
.reset-btn {width:100%;padding:12px;margin-top:20px;background:#f0f0f0;border:none;border-radius:8px;font-size:14px;color:#666;cursor:pointer;transition:all 0.3s ease;}
.reset-btn:hover {background:#e0e0e0;}
@media(max-width:600px){.header h1{font-size:24px;}.section h2{font-size:18px;}.content{padding:20px;}}
.montessori-icon {width:50px;height:50px;} /* حجم الأيقونات */
</style>
</head>
<body>
<div class="container">
 <div class="header">
  <h1>🌟 جدول روتيني اليومي</h1>
  <p>تابع مهامك اليومية واجمع النجوم!</p>
 </div>
 <div class="content">

  <!-- Morning Routine -->
  <div class="section">
   <h2>☀️ Morning Routine</h2>
   <div class="task-list" id="morningTasks">
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/wakeup.png" class="montessori-icon"> Wake up early</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/makebed.png" class="montessori-icon"> Make bed</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/bathroom.png" class="montessori-icon"> Bathroom</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/teeth.png" class="montessori-icon"> Brush teeth</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/breakfast.png" class="montessori-icon"> Breakfast</div>
    </div>
   </div>
  </div>

  <!-- Evening Routine -->
  <div class="section">
   <h2>🌙 Evening Routine</h2>
   <div class="task-list" id="eveningTasks">
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/toys.png" class="montessori-icon"> Tidy toys</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/shower.png" class="montessori-icon"> Shower</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/teeth1.png" class="montessori-icon"> Brush teeth</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/sleep.png" class="montessori-icon"> Pajamas</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/story.png" class="montessori-icon"> Read story</div>
    </div>
    <div class="task-item" onclick="toggleTask(this)">
     <div class="task-checkbox"></div>
     <div class="task-name"><img src="icons/bedtime.png" class="montessori-icon"> Bedtime</div>
    </div>
   </div>
  </div>

  <!-- Progress Section -->
  <div class="progress-section">
   <div class="progress-title">🎯 Progress Today</div>
   <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"><span id="progressText">0%</span></div></div>
   <div class="stats">
    <div class="stat-box"><div class="stat-number" id="completedCount">0</div><div class="stat-label">Completed Tasks</div></div>
    <div class="stat-box"><div class="stat-number" id="totalCount">11</div><div class="stat-label">Total Tasks</div></div>
    <div class="stat-box"><div class="stat-number" id="starsCount">0</div><div class="stat-label">Stars</div></div>
   </div>
   <div class="stars-container"><div class="stars" id="starsDisplay"></div></div>
   <button class="reset-btn" onclick="resetDay()">🔄 Reset Day</button>
  </div>

 </div>
</div>

<script>
function toggleTask(el){el.classList.toggle('completed');updateProgress();}
function updateProgress(){
  const all=document.querySelectorAll('.task-item');
  const done=document.querySelectorAll('.task-item.completed');
  const perc=Math.round((done.length/all.length)*100);
  document.getElementById('progressFill').style.width=perc+'%';
  document.getElementById('progressText').textContent=perc+'%';
  document.getElementById('completedCount').textContent=done.length;
  document.getElementById('totalCount').textContent=all.length;
  const stars=Math.floor(done.length/2);
  document.getElementById('starsCount').textContent=stars;
  let starsDisp='';
  for(let i=0;i<stars;i++){starsDisp+='⭐ ';}
  document.getElementById('starsDisplay').textContent=starsDisp||'🎯 Keep going!';
}
function resetDay(){document.querySelectorAll('.task-item').forEach(t=>t.classList.remove('completed'));updateProgress();}
updateProgress();
</script>
</body>
</html>
